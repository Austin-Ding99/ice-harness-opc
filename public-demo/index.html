<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Ice-Harness OPC - 制冷数据穿刺控制中心</title>
    <script>
        (function() {
            const theme = localStorage.getItem('opc_main_theme_v9') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script defer crossorigin="anonymous" src="https://unpkg.com/chart.js/dist/chart.umd.min.js"></script>
    <!-- SheetJS 暂未使用，先不阻塞主页面首屏渲染。需要导出 XLSX 时再按需引入。 -->
    
    <script defer src="agent_extractor.js"></script>
    <script defer src="agent_monitor.js"></script>
    <script defer src="agent_cleaner.js"></script>
    <script defer src="agent_supervisor.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --panel-strong: #010409;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --border: #30363d;
            --button-bg: #21262d;
            --button-hover: #30363d;
            --input-bg: #010409;
            --chart-bg: #0d1117;
            --tooltip-bg: rgba(22, 27, 34, 0.94);
            --log-border: rgba(48, 54, 61, 0.35);
            --toolbar-bg: rgba(22, 27, 34, 0.96);
            --toolbar-shadow: rgba(0,0,0,0.5);
            --selection-bg: rgba(88,166,255,0.3);
        }
        [data-theme="light"] {
            --bg-color: #f6f8fa;
            --panel-bg: #ffffff;
            --panel-strong: #f6f8fa;
            --text-main: #24292f;
            --text-muted: #57606a;
            --accent-blue: #0969da;
            --accent-green: #1a7f37;
            --accent-red: #cf222e;
            --accent-yellow: #9a6700;
            --border: #d0d7de;
            --button-bg: #f6f8fa;
            --button-hover: #eaeef2;
            --input-bg: #ffffff;
            --chart-bg: #ffffff;
            --tooltip-bg: rgba(255, 255, 255, 0.96);
            --log-border: rgba(208, 215, 222, 0.7);
            --toolbar-bg: rgba(255, 255, 255, 0.96);
            --toolbar-shadow: rgba(31,35,40,0.16);
            --selection-bg: rgba(9,105,218,0.18);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.2s, color 0.2s; }
        header { padding: 12px 20px; background-color: var(--panel-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--accent-blue); font-weight: 600; white-space: nowrap;}
        .controls { display: flex; gap: 8px; align-items: center; }
        button { background-color: var(--button-bg); color: var(--text-main); border: 1px solid var(--border); padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.15s;}
        button:hover:not(:disabled) { background-color: var(--button-hover); border-color: var(--text-muted); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.primary { background-color: #238636; color: white; border-color: rgba(240,246,252,0.1); }
        button.danger { background-color: var(--accent-red); color: white; border: none; }
        button.warning { background-color: var(--accent-yellow); color: #000; border: none; }
        button.success { background-color: #2ea043; color: white; border: none; }
        button.ai-btn { background-color: #8957e5; border-color: #8957e5; color: white; }
        button.theme-btn { width: 34px; padding: 7px 0; font-size: 1rem; line-height: 1; }
        input, select, textarea { background: var(--input-bg); color: var(--text-main); border:1px solid var(--border); border-radius:6px; padding:6px 10px; outline: none; font-size: 0.85rem; font-family: inherit;}
        .main-content { display: flex; flex: 1; padding: 12px; gap: 12px; min-height: 0; box-sizing: border-box; }
        .sidebar { width: 160px; background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 10px; background-color: var(--panel-strong); border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; color: var(--accent-blue); text-align: center;}
        .toggles { display: flex; flex-direction: column; padding: 10px; gap: 12px; overflow-y: auto; flex:1;}
        .channel-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; color: var(--text-main);}
        .chart-panel { flex: 2.6; background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; position: relative; min-height: 0; }
        .panel-header { padding: 10px 15px; background-color: var(--panel-strong); border-bottom: 1px solid var(--border); font-size: 0.9rem; display: flex; justify-content: space-between; font-weight: 500; align-items: center; flex-shrink: 0;}
        .zoom-controls { display: flex; gap: 5px; }
        .zoom-controls button { padding: 4px 8px; font-size: 0.75rem; background: var(--bg-color); border: 1px solid var(--border); border-radius: 4px; }
        .zoom-controls button.active-mode { border-color: var(--accent-blue); color: var(--accent-blue); }
        .chart-container { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; overflow: hidden; }
        #tempChartContainer { flex: 2.5; position: relative; min-height: 0; }
        #powerChartContainer { flex: 1; position: relative; min-height: 0; border-top: 1px solid var(--border); padding-top: 5px; display: none; }
        canvas { background-color: var(--chart-bg); cursor: grab; width: 100% !important; height: 100% !important;}
        canvas:active { cursor: grabbing; }
        #selectionBox { background: var(--selection-bg) !important; border: 1px solid var(--accent-blue) !important; }
        #agentToolbar {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--accent-blue);
            z-index: 20;
            box-shadow: 0 4px 15px var(--toolbar-shadow);
            backdrop-filter: blur(8px);
        }
        #agentToolbar .toolbar-title { color: var(--accent-blue); font-size:0.8rem; margin-right:10px; font-weight:bold; }
        #agentToolbar button { background: var(--button-bg); color: var(--text-main); border: 1px solid var(--border); }
        #chartTooltipDock {
            display: none;
            position: fixed;
            width: min(340px, calc(100vw - 28px));
            max-height: min(58vh, 420px);
            overflow: auto;
            background: var(--tooltip-bg);
            color: var(--text-main);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            box-shadow: 0 8px 28px var(--toolbar-shadow);
            z-index: 1200;
            padding: 10px 12px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            font-family: 'Consolas','Monaco',monospace;
            font-size: 0.78rem;
            line-height: 1.45;
            transform: translateZ(0);
        }
        #chartTooltipDock .tooltip-title { color: var(--accent-blue); font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #chartTooltipDock .tooltip-row { display: grid; grid-template-columns: 12px minmax(0, 1fr) auto; gap: 7px; align-items: center; margin: 2px 0; }
        #chartTooltipDock .tooltip-color { width: 10px; height: 3px; border-radius: 2px; }
        #chartTooltipDock .tooltip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-main); }
        #chartTooltipDock .tooltip-value { color: var(--text-muted); white-space: nowrap; }
        .dashboard-panel { flex: 1; background-color: var(--panel-strong); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-width: 320px;}
        .dash-header { padding: 10px 15px; border-bottom: 1px solid var(--border); font-weight: bold; color: var(--accent-blue); background-color: var(--panel-bg); font-size: 0.85rem;}
        .supervisor-panel { padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel-bg); display: grid; grid-template-columns: auto minmax(0, 1fr) minmax(300px, 360px); gap: 10px; align-items: stretch; flex-shrink: 0; }
        .supervisor-actions { display: grid; grid-template-columns: 1fr; gap: 5px; align-items: stretch; width: 92px; }
        .supervisor-actions button { padding: 4px 6px; font-size: 0.68rem; line-height: 1.15; }
        .agent-health-grid { display: grid; grid-template-columns: repeat(6, minmax(118px, 1fr)); gap: 6px; overflow: visible; align-items: stretch; }
        .health-item { border: 1px solid var(--border); border-left-width: 4px; border-radius: 7px; padding: 5px 7px; background: var(--panel-strong); min-width: 0; }
        .health-item.ok { border-left-color: var(--accent-green); }
        .health-item.busy { border-left-color: var(--accent-yellow); }
        .health-item.bad { border-left-color: var(--accent-red); }
        .health-top { display: flex; justify-content: space-between; gap: 6px; font-size: 0.68rem; font-weight: 700; }
        .health-top b { white-space: nowrap; color: var(--accent-blue); }
        .health-item.busy .health-top b { color: var(--accent-yellow); }
        .health-item.bad .health-top b { color: var(--accent-red); }
        .health-detail { margin-top: 2px; color: var(--text-main); font-size: 0.66rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .health-foot { margin-top: 2px; color: var(--text-muted); font-size: 0.62rem; white-space: nowrap; }
        .health-log-btn { margin-top: 4px; width: 100%; padding: 3px 6px; border-radius: 5px; font-size: 0.62rem; font-weight: 700; color: var(--accent-blue); background: transparent; border: 1px dashed var(--border); }
        .health-log-btn:hover { border-color: var(--accent-blue); background: var(--button-hover); }
        .task-ledger { border-left: 1px dashed var(--border); padding-left: 10px; min-height: 0; }
        .task-ledger-title { color: var(--accent-blue); font-size: 0.68rem; font-weight: 700; margin-bottom: 4px; display:flex; justify-content:space-between; align-items:center; }
        #taskLedgerList { max-height: 86px; overflow-y: auto; padding-right: 3px; }
        .task-row { display: flex; justify-content: space-between; gap: 8px; border: 1px solid var(--border); border-left-width: 4px; border-radius: 7px; padding: 5px 7px; margin-top: 4px; background: var(--panel-strong); align-items: center; }
        .task-row.ok { border-left-color: var(--accent-green); }
        .task-row.busy { border-left-color: var(--accent-yellow); }
        .task-row.bad { border-left-color: var(--accent-red); }
        .task-main { min-width: 0; display:flex; flex-direction:column; gap:2px; }
        .task-title { font-size: 0.66rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-meta, .task-empty { color: var(--text-muted); font-size: 0.66rem; }
        .task-status { font-size: 0.68rem; font-weight: 700; white-space: nowrap; color: var(--accent-blue); }
        @media (max-width: 1280px) {
            .supervisor-panel { grid-template-columns: auto minmax(0, 1fr); }
            .agent-health-grid { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
            .task-ledger { grid-column: 1 / -1; border-left: 0; border-top: 1px dashed var(--border); padding-left: 0; padding-top: 6px; }
        }
        .console { flex: 1; padding: 12px; font-family: 'Consolas', monospace; font-size: 0.8rem; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log-entry { line-height: 1.5; border-bottom: 1px solid var(--log-border); padding-bottom: 6px; }
        .agent-name { cursor: pointer; text-decoration: underline dashed rgba(128,128,128,0.55); text-underline-offset: 3px; transition: 0.2s;}
        .agent-name:hover { text-decoration: underline solid; text-shadow: 0 0 8px currentColor;}
        .agent-监理Agent { color: var(--accent-blue); font-weight: bold; }
        .agent-实验监控与预警Agent { color: var(--accent-red); font-weight: bold; }
        .agent-数据提取与通道选择Agent { color: #bc8cff; font-weight: bold; }
        .agent-表格清洗与云端同步Agent { color: var(--accent-blue); font-weight: bold; }
        .agent-分析与报告Agent { color: var(--accent-yellow); font-weight: bold; }
        .agent-超级个体 { color: #fff; background-color: #d29922; padding: 0 4px; border-radius: 2px; font-weight: bold; text-decoration: none;}
        .log-error { color: var(--accent-red); font-weight: bold; }
        .log-success { color: var(--accent-green); font-weight: bold; }
        .code-modal { display:none; position:fixed; right:18px; bottom:18px; width:min(760px, calc(100vw - 36px)); max-height:72vh; background:var(--panel-bg); color:var(--text-main); border:1px solid var(--accent-blue); border-radius:10px; box-shadow:0 12px 40px var(--toolbar-shadow); z-index:2000; overflow:hidden; }
        .code-modal.active { display:flex; flex-direction:column; }
        .code-modal-header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 12px; background:var(--panel-strong); border-bottom:1px solid var(--border); color:var(--accent-blue); font-weight:bold; }
        .code-modal-header button { padding:3px 8px; }
        .code-modal pre { margin:0; padding:14px; overflow:auto; white-space:pre-wrap; font-size:0.78rem; line-height:1.55; font-family:'Consolas','Monaco',monospace; }
        .agent-name[data-code-ref]::after { content:' ⌘'; opacity:0.55; font-size:0.72em; }
        .demo-primary-btn { background:linear-gradient(135deg, #238636, #1f6feb); color:#fff; border:0; box-shadow:0 6px 16px rgba(31,111,235,0.24); }
        .demo-primary-btn:disabled { opacity:0.6; }
        .demo-prompt-strip { display:flex; align-items:center; gap:8px; padding:6px 12px; border-bottom:1px solid var(--border); background:var(--panel-bg); flex-shrink:0; overflow-x:auto; }
        .demo-prompt-title { color:var(--text-muted); font-size:0.74rem; white-space:nowrap; }
        .demo-prompt-note { color:var(--text-muted); font-size:0.74rem; white-space:nowrap; }
        .demo-chip { font-family:'Consolas','Monaco',monospace; font-size:0.72rem; color:var(--accent-blue); border-color:rgba(88,166,255,0.36); background:var(--panel-strong); padding:4px 8px; white-space:nowrap; }
        .demo-api-strip { display:flex; align-items:center; gap:8px; padding:0 12px 6px; border-bottom:1px solid var(--border); background:var(--panel-bg); flex-shrink:0; }
        .demo-api-title { color:var(--text-muted); font-size:0.74rem; white-space:nowrap; }
        .demo-api-btn { color:var(--accent-green); border-color:rgba(63,185,80,0.42); background:var(--panel-strong); padding:4px 9px; white-space:nowrap; }
        @media (max-width: 720px) {
            body { overflow:auto; height:auto; min-height:100vh; }
            .main-content { min-height:620px; }
        }
    </style>
</head>
<body>

<input type="file" id="csvFileInput" accept=".csv, .txt, .tsv" style="display:none;" onchange="if(window.dataExtractorAgent) window.dataExtractorAgent.handleFileUpload(event)">

<header>
    <h1>⬡ Ice-Harness OPC</h1>
    <div style="flex:1; margin: 0 20px; display:flex; gap:8px;">
        <input type="text" id="nlCommand" placeholder="NL2Action：'调整范围在-50到150度' / '剔除坏点' (回车执行)" style="flex:1;" onkeydown="if(event.key==='Enter') executeNlCommand()">
        <button class="ai-btn" id="btnNlSubmit" onclick="executeNlCommand()">🧠 AI 执行</button>
    </div>
    <div class="controls">
        <button id="themeBtn" class="theme-btn" onclick="window.toggleTheme()" title="切换明暗主题">☀️</button>
        <input type="password" id="deepseekApiKey" placeholder="DeepSeek API Key" style="width:130px;" onchange="window.saveApiKey(this.value)">
        <select id="speedSelect" onchange="if(window.monitorAgent) window.monitorAgent.syncSpeed()">
            <option value="500">1x</option>
            <option value="100" selected>5x</option>
            <option value="20">25x</option>
        </select>
        <button id="btnDemoHeader" class="demo-primary-btn" onclick="window.loadDemoData()">加载示例数据</button>
        <button id="btnUpload" onclick="document.getElementById('csvFileInput').click()" style="border-color: var(--accent-blue); color: var(--accent-blue);">加载本地数据📂</button>
        <button id="btnStart" class="primary" onclick="handleAction('开始监控', 'CMD_START')" disabled>▶ 开始</button>
        <button id="btnTestPause" onclick="handleAction('暂停/继续试验', 'CMD_PAUSE')" disabled>⏸ 暂停</button>
        <button id="btnFixFault" class="success" onclick="handleAction('剔除坏点并修复', 'CMD_FIX_ERASE')" style="display:none;">🛠️ 剔除异常</button>
        <button id="btnClean" onclick="if(window.cleanerAgent) window.cleanerAgent.activate('CLEAN')" style="border-color: var(--accent-green); color: var(--accent-green);">🖱️ 手动框选</button>
        <button id="btnComplete" onclick="handleAction('试验完成', 'CMD_COMPLETE')" disabled>⏹ 完成</button>
        <button id="btnAnalyze" class="ai-btn" onclick="if(window.cleanerAgent) window.cleanerAgent.activate('REPORT')" style="display:none;">📊 数据分析</button>
    </div>
</header>

<div class="supervisor-panel">
    <div class="supervisor-actions">
        <button id="btnRestoreCheckpoint" onclick="window.supervisorAgent?.restoreCheckpoint()" disabled>恢复断点</button>
        <button onclick="window.supervisorAgent?.checkpoint('超级个体手动保存')">保存断点</button>
        <button onclick="window.supervisorAgent?.clearRuntime()">清空台账</button>
    </div>
    <div id="agentHealthGrid" class="agent-health-grid"></div>
    <div class="task-ledger">
        <div class="task-ledger-title"><span>触发事件台账</span><span>失败自动重试</span></div>
        <div id="taskLedgerList"></div>
    </div>
</div>

<div class="demo-prompt-strip" aria-label="示例 Prompt">
    <span class="demo-prompt-title">示例 Prompt：</span>
    <button class="demo-chip" onclick="window.runExamplePrompt('剔除150℃以上数据')">剔除150℃以上数据</button>
    <button class="demo-chip" onclick="window.runExamplePrompt('隐藏异常通道')">隐藏异常通道</button>
    <button class="demo-chip" onclick="window.runExamplePrompt('显示冰膜温度')">显示冰膜温度</button>
    <span class="demo-prompt-note">（当然可以按照自己的自然语言输入）</span>
</div>

<div class="demo-api-strip" aria-label="体验 API">
    <span class="demo-api-title">体验API（DeepSeek）：</span>
    <button id="btnApiTest" class="demo-api-btn" onclick="window.testDeepSeekApi()">点击调用API</button>
</div>

<div class="main-content">
    <div class="sidebar">
        <div class="sidebar-header">通道控制矩阵</div>
        <div class="toggles" id="channelControls">
            <span style="color:#8b949e; font-size:0.8rem; text-align:center; margin-top:20px;">等待 CSV 载入...</span>
        </div>
    </div>
    <div class="chart-panel">
        <div class="panel-header">
            <span>多维时序特征洞察</span>
            <div class="zoom-controls">
                <button onclick="window.zoomX('in')">🔍 X放大</button>
                <button onclick="window.zoomX('out')">🔍 X缩小</button>
                <button id="btnAutoScroll" class="active-mode" onclick="window.resumeAutoScroll()">▶ 追踪最新</button>
            </div>
            <span style="color: var(--accent-yellow); font-size: 0.85rem; font-weight: bold;" id="dataStatus">未连接</span>
        </div>
        <div class="chart-container" id="chartArea">
            <div id="tempChartContainer"><canvas id="liveChart"></canvas></div>
            <div id="powerChartContainer"><canvas id="powerChart"></canvas></div>
            <div id="selectionOverlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair; z-index:10;">
                <div id="selectionBox" style="position:absolute; top:0; height:100%; background:rgba(88,166,255,0.3); border:1px solid #58a6ff; display:none; pointer-events:none;"></div>
            </div>
            <div id="agentToolbar">
                <span class="toolbar-title">✨ 请框选感兴趣数据段 (按 Esc 退出)</span>
                <button onclick="if(window.cleanerAgent) window.cleanerAgent.reselect()">🔄 重选</button>
                <button onclick="if(window.cleanerAgent) window.cleanerAgent.continueSelect()" class="warning">➕ 继续添加</button>
                <button onclick="if(window.cleanerAgent) window.cleanerAgent.finishSelect()" class="primary">✔️ 选择完成</button>
            </div>
            <div id="chartTooltipDock"></div>
        </div>
    </div>
    <div class="dashboard-panel">
        <div class="dash-header">实时触发状态看板</div>
        <div class="console" id="console"></div>
    </div>
</div>

<div id="codeInspector" class="code-modal" role="dialog" aria-label="Agent 触发代码查看器">
    <div class="code-modal-header">
        <span id="codeInspectorTitle">Agent 触发代码</span>
        <button onclick="window.closeCodeInspector()">关闭</button>
    </div>
    <pre id="codeInspectorBody"></pre>
</div>

<script>
    window.addEventListener('error', function(e) {
        const message = e.message || '未知脚本异常';
        const isOpaqueThirdPartyError = message === 'Script error.' && !e.error;
        if (isOpaqueThirdPartyError || /ResizeObserver loop/i.test(message)) {
            console.warn('Ignored non-fatal browser/library event:', message, e.filename || '');
            window.supervisorAgent?.recordLog(
                '监理Agent',
                `捕获非致命浏览器脚本事件：${message}；数据状态保持不变。`,
                'normal',
                'ENV_SCRIPT_EVENT'
            );
            return;
        }
        const ds = document.getElementById('dataStatus');
        if(ds) {
            ds.innerText = "环境异常: " + message;
            ds.style.color = "red";
        }
        window.supervisorAgent?.recordLog('监理Agent', `环境异常：${message}`, 'error', 'ENV_RUNTIME_ERROR');
    });

    window.addEventListener('unhandledrejection', function(e) {
        const reason = e.reason?.message || String(e.reason || 'Promise异常');
        const ds = document.getElementById('dataStatus');
        if(ds) {
            ds.innerText = "环境异常: " + reason;
            ds.style.color = "red";
        }

    window.undoStack = [];

    window.captureUndoSnapshot = function(label = '超级个体指令') {
        try {
            const chart = window.chartInstance;
            const power = window.powerChartInstance;
            const snapshot = {
                label,
                ts: Date.now(),
                currentIndex: window.currentIndex,
                fullTimeLabels: [...(window.fullTimeLabels || [])],
                isAutoScroll: window.isAutoScroll,
                globalViewMode: window.globalViewMode,
                currentWindowSize: window.currentWindowSize,
                viewStartIndex: window.viewStartIndex,
                viewEndIndex: window.viewEndIndex,
                monitor: window.monitorAgent ? {
                    isRunning: window.monitorAgent.isRunning,
                    tempRange: { ...window.monitorAgent.tempRange },
                    activeFaults: { ...window.monitorAgent.activeFaults },
                    hasTriggeredAlarm: window.monitorAgent.hasTriggeredAlarm
                } : null,
                chart: chart ? {
                    labels: [...chart.data.labels],
                    datasets: chart.data.datasets.map(d => ({ hidden: !!d.hidden, data: [...d.data] })),
                    xMin: chart.options?.scales?.x?.min,
                    xMax: chart.options?.scales?.x?.max
                } : null,
                power: power ? {
                    labels: [...power.data.labels],
                    datasets: power.data.datasets.map(d => ({ hidden: !!d.hidden, data: [...d.data] })),
                    xMin: power.options?.scales?.x?.min,
                    xMax: power.options?.scales?.x?.max
                } : null,
                checkboxStates: Array.from(document.querySelectorAll('#channelControls input')).map(cb => cb.checked),
                speedValue: document.getElementById('speedSelect')?.value || null
            };
            window.undoStack.push(snapshot);
            if (window.undoStack.length > window.MAX_UNDO_STEPS) window.undoStack.shift();

        }

    window.restoreUndoSnapshot = function() {
        const snapshot = window.undoStack.pop();
        if (!snapshot) {
            window.logAgent?.('监理Agent', '当前没有可撤回的超级个体指令。', 'normal', 'UNDO_COMMAND');
            return;
        }
        try {
            window.fullTimeLabels = [...(snapshot.fullTimeLabels || snapshot.chart?.labels || [])];
            if (snapshot.chart && window.chartInstance) {
                window.chartInstance.data.labels = [...snapshot.chart.labels];
                snapshot.chart.datasets.forEach((sd, i) => {
                    if (!window.chartInstance.data.datasets[i]) return;
                    window.chartInstance.data.datasets[i].data = [...sd.data];
                    window.chartInstance.data.datasets[i].hidden = sd.hidden;
                });

                window.chartInstance.options.scales.x.max = snapshot.chart.xMax;
            }
            if (snapshot.power && window.powerChartInstance) {
                window.powerChartInstance.data.labels = [...snapshot.power.labels];
                snapshot.power.datasets.forEach((sd, i) => {
                    if (!window.powerChartInstance.data.datasets[i]) return;
                    window.powerChartInstance.data.datasets[i].data = [...sd.data];
                    window.powerChartInstance.data.datasets[i].hidden = sd.hidden;
                });
                window.powerChartInstance.options.scales.x.min = snapshot.power.xMin;
                window.powerChartInstance.options.scales.x.max = snapshot.power.xMax;
            }
            window.currentIndex = snapshot.currentIndex;
            window.isAutoScroll = snapshot.isAutoScroll;
            window.globalViewMode = snapshot.globalViewMode;
            window.currentWindowSize = snapshot.currentWindowSize;
            window.viewStartIndex = snapshot.viewStartIndex;
            window.viewEndIndex = snapshot.viewEndIndex;
            const autoBtn = document.getElementById('btnAutoScroll');

            if (snapshot.monitor && window.monitorAgent) {
                window.monitorAgent.tempRange = { ...snapshot.monitor.tempRange };
                window.monitorAgent.activeFaults = { ...snapshot.monitor.activeFaults };
                window.monitorAgent.hasTriggeredAlarm = snapshot.monitor.hasTriggeredAlarm;
                // 撤销只恢复数据/视图状态，不自动重启或停止计时器，避免误触发后台滚动。

            });
            if (window.chartInstance) window.chartInstance.update('none');
            if (window.powerChartInstance) window.powerChartInstance.update('none');
            window.logAgent?.('超级个体', `撤回上一步指令：[${snapshot.label}]`, 'success', 'UNDO_COMMAND');

        if (hms) return `${hms[1].padStart(2, '0')}${hms[2]}${(hms[3] || '00').padStart(2, '0')}`;
        const compact = raw.match(/(\d{2})(\d{2})(\d{2})$/);

    window.escapeTooltipHtml = function(value) {

    window.collectTooltipRowsAtIndex = function(dataIndex, unitHint = '℃') {
        const charts = [window.chartInstance, window.powerChartInstance].filter(Boolean);
        const rows = [];
        charts.forEach(chart => {
            (chart.data?.datasets || []).forEach((dataset, datasetIndex) => {
                const visible = typeof chart.isDatasetVisible === 'function'
                    ? chart.isDatasetVisible(datasetIndex)
                    : !dataset.hidden;
                if (!visible) return;
                const label = dataset.label || '数据';
                const raw = dataset.data?.[dataIndex];
                const unit = label.includes('功率') ? 'W' : '℃';
                let value = '-';
                if (raw !== null && raw !== undefined && !Number.isNaN(Number(raw))) {
                    const num = Number(raw);
                    value = `${Number.isFinite(num) ? num.toFixed(1) : raw}${unit}`;
                }
                const color = dataset.borderColor || dataset.backgroundColor || 'var(--accent-blue)';
                rows.push(`<div class="tooltip-row"><span class="tooltip-color" style="background:${color}"></span><span class="tooltip-name" title="${window.escapeTooltipHtml(label)}">${window.escapeTooltipHtml(label)}</span><span class="tooltip-value">${window.escapeTooltipHtml(value)}</span></div>`);
            });
        });

        charts.forEach(chart => {

                });
                if (visibleDatasetIndex >= 0 && chart.data.datasets[visibleDatasetIndex]?.data?.length > dataIndex) {

    window.externalTooltipHandler = function(context, unitHint = '℃') {
        const tip = document.getElementById('chartTooltipDock');
        const tooltip = context.tooltip;
        if (!tip || !tooltip || tooltip.opacity === 0) {
            if (tip) tip.style.display = 'none';
            return;
        }
        const firstPoint = tooltip.dataPoints && tooltip.dataPoints.length ? tooltip.dataPoints[0] : null;
        const dataIndex = firstPoint ? firstPoint.dataIndex : -1;
        const rawTitle = dataIndex >= 0 ? window.fullTimeLabels?.[dataIndex] : '';
        const title = rawTitle || (tooltip.title && tooltip.title.length ? tooltip.title[0] : '');
        const combinedRows = dataIndex >= 0 ? window.collectTooltipRowsAtIndex(dataIndex, unitHint) : '';
        const rows = combinedRows || (tooltip.dataPoints || []).map(dp => {
            const dataset = dp.dataset || {};
            const label = dataset.label || '数据';
            const raw = dp.parsed && typeof dp.parsed.y !== 'undefined' ? dp.parsed.y : dp.raw;
            const unit = label.includes('功率') ? 'W' : '℃';
            let value = '-';
            if (raw !== null && raw !== undefined && !Number.isNaN(Number(raw))) {
                const num = Number(raw);
                value = `${Number.isFinite(num) ? num.toFixed(1) : raw}${unit}`;
            }
            const color = dataset.borderColor || dataset.backgroundColor || 'var(--accent-blue)';
            return `<div class="tooltip-row"><span class="tooltip-color" style="background:${color}"></span><span class="tooltip-name" title="${window.escapeTooltipHtml(label)}">${window.escapeTooltipHtml(label)}</span><span class="tooltip-value">${window.escapeTooltipHtml(value)}</span></div>`;
        }).join('');
        tip.innerHTML = `<div class="tooltip-title">时间：${window.escapeTooltipHtml(title)}</div>${rows}`;
        tip.style.display = 'block';

        // 固定到视口层，允许越出监控图左侧，避免靠左数据点被弹窗遮住。
        const canvasRect = context.chart.canvas.getBoundingClientRect();
        const caretX = canvasRect.left + tooltip.caretX;
        const caretY = canvasRect.top + tooltip.caretY;
        const gap = 14;
        const pad = 8;
        const tipW = tip.offsetWidth || 340;
        const tipH = tip.offsetHeight || 180;
        let left = caretX - tipW - gap;
        if (left < pad) left = Math.min(window.innerWidth - tipW - pad, caretX + gap);
        let top = caretY - Math.min(24, Math.floor(tipH * 0.15));
        const maxTop = Math.max(pad, window.innerHeight - tipH - pad);
        if (top > maxTop) top = maxTop;
        if (top < pad) top = pad;
        tip.style.left = `${left}px`;
        tip.style.top = `${top}px`;
    };

            if (!chart || !chart.options || !chart.options.scales) return;

    // 图表视窗控制：滚轮缩放、拖拽平移、按钮缩放统一走同一套状态，避免闪烁和失效。
    window.viewStartIndex = 0;

        return window.chartInstance?.data?.labels?.length || 0;

    window.scheduleChartUpdate = function() {
        if (window._chartUpdateRaf) return;
        window._chartUpdateRaf = requestAnimationFrame(() => {
            window._chartUpdateRaf = null;

    window.applyChartWindow = function(startIdx, endIdx, shouldUpdate = true) {
        const len = window.getChartLength();
        if (!len || !window.chartInstance) return;
        let start = Math.max(0, Math.floor(Number(startIdx) || 0));
        let end = Math.min(len - 1, Math.floor(Number(endIdx) || (len - 1)));
        if (end < start) end = start;
        window.viewStartIndex = start;
        window.viewEndIndex = end;
        if (!window.isAutoScroll) window.currentWindowSize = Math.max(1, end - start + 1);

        // Chart.js 的 category scale 支持数值索引；比使用 label 字符串更能避免重复时间戳导致的 indexOf 错位。
        window.chartInstance.options.scales.x.min = start;
        window.chartInstance.options.scales.x.max = end;
        if (window.hasPower && window.powerChartInstance) {
            window.powerChartInstance.options.scales.x.min = start;
            window.powerChartInstance.options.scales.x.max = end;
        }
        if (shouldUpdate) window.scheduleChartUpdate();
    };

    window.setLatestChartWindow = function(shouldUpdate = true) {
        const len = window.getChartLength();
        if (!len) return;
        // “追踪最新”改为全量追踪：始终固定初始采样点，右边界扩展到最新采样点，不再滑动窗口。
        window.globalViewMode = 'full';
        window.applyChartWindow(0, len - 1, shouldUpdate);
    };

    window.setupNativeZoomPan = function() {
        if (window._zoomPanBound) return;
        window._zoomPanBound = true;
        const chartArea = document.getElementById('chartArea');
        let isDragging = false;
        let lastX = 0;

        chartArea.addEventListener('mousedown', (e) => {
            if (window.cleanerAgent?.isActive) return;
            window.stopAutoScroll();
            isDragging = true;
            lastX = e.clientX;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            if (Math.abs(deltaX) > 4) {
                window.panChartNative(deltaX > 0 ? -1 : 1);
                lastX = e.clientX;
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        chartArea.addEventListener('mouseleave', () => { isDragging = false; });
        chartArea.addEventListener('wheel', (e) => {
            if (!window.chartInstance || window.getChartLength() === 0 || window.cleanerAgent?.isActive) return;
            e.preventDefault();
            e.stopPropagation();
            window.zoomX(e.deltaY > 0 ? 'out' : 'in', e);
        }, { passive: false });
    };

    window.panChartNative = function(direction) {
        const len = window.getChartLength();
        if (!len || !window.chartInstance) return;
        window.stopAutoScroll();
        window.globalViewMode = 'window';
        let start = window.viewStartIndex ?? Math.max(0, len - (window.currentWindowSize || 60));
        let end = window.viewEndIndex ?? (len - 1);
        let size = Math.max(1, end - start + 1);
        let shift = Math.max(1, Math.floor(size * 0.08));
        start += direction * shift;
        end += direction * shift;
        if (start < 0) { start = 0; end = Math.min(len - 1, size - 1); }
        if (end >= len) { end = len - 1; start = Math.max(0, end - size + 1); }
        window.applyChartWindow(start, end, true);
    };

    window.resolveChannelNames = function(targets = []) {
        const list = Array.isArray(targets) ? targets : [targets];
        const normalizedTargets = list.map(t => String(t || '').trim()).filter(Boolean);
        if (!normalizedTargets.length || normalizedTargets.includes('ALL')) return window.dynamicChannels.map(ch => ch.name);
        const result = [];
        window.dynamicChannels.forEach(ch => {
            const chName = String(ch.name).trim();
            const hit = normalizedTargets.some(t => t === chName || t === ch.id || chName === t.replace(/通道/g, '').trim());
            if (hit && !result.includes(chName)) result.push(chName);
        });
        return result;
    };

    window.hasChineseChar = function(value) {
        return /[\u4e00-\u9fff]/.test(String(value || ''));
    };

    window.getChineseChannelNames = function() {
        return (window.dynamicChannels || []).map(ch => ch.name).filter(name => window.hasChineseChar(name));
    };

    window.getNonChineseChannelNames = function() {
        return (window.dynamicChannels || []).map(ch => ch.name).filter(name => !window.hasChineseChar(name));
    };

    window.inferChannelsFromText = function(text) {
        const raw = String(text || '');
        let targetText = raw;
        const keepMatch = raw.match(/(?:只保留|仅保留|只显示|只看|只打开|仅打开|只开启|仅开启|独占显示|单独显示|打开只有|显示只有)(.*)/);
        if (keepMatch) targetText = keepMatch[1];
        const eraseSplit = targetText.split(/剔除|清除|删除|擦除|清理|处理|移除|隐藏|关闭/);
        if (eraseSplit.length > 1 && eraseSplit[0].trim()) targetText = eraseSplit[0];
        const simplified = targetText
            .replace(/以上|以下|大于|小于|超过|高于|低于|少于|上限|下限|上下限/g, ' ')
            .replace(/-?\d+(?:\.\d+)?\s*(?:度|℃|c|C)?/g, ' ')
            .replace(/[，,、;；/\\|]+/g, ' ')
            .replace(/通道|数据点|数据|温度|只保留|仅保留|只显示|只看|只打开|仅打开|只开启|仅开启|独占显示|单独显示|打开只有|显示只有|保留|显示|打开|开启/g, ' ');
        const compact = simplified.replace(/\s+/g, '');
        const result = [];
        const channels = (window.dynamicChannels || []).map(ch => ch.name).sort((a,b) => b.length - a.length);
        channels.forEach(name => {
            if (!name) return;
            const compactName = String(name).replace(/\s+/g, '');
            if (name.length === 1) {
                if (compact.includes(name) && !result.includes(name)) result.push(name);
            } else if (targetText.includes(name) || simplified.includes(name) || compact.includes(compactName)) {
                if (!result.includes(name)) result.push(name);
            }
        });
        return result;
    };

    window.safeNumberOrNull = function(value) {
        if (value === null || value === undefined || value === '') return null;
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
    };

    window.parseEraseRuleFromCommand = function(userCmd, intent = {}) {
        const text = String(userCmd || '');
        const explicitValue = window.safeNumberOrNull(intent.value);
        const explicitMin = window.safeNumberOrNull(intent.min_value);
        const explicitMax = window.safeNumberOrNull(intent.max_value);
        const rule = {
            channels: intent.channels || [],
            operator: intent.operator || null,
            value: explicitValue,
            min: explicitMin,
            max: explicitMax,
            useRangeDefault: false
        };

        const match = text.match(/(-?\d+(?:\.\d+)?)\s*(?:度|℃|°c|c|C)?\s*(以上|大于|超过|高于|>|以下|小于|低于|少于|<|above|over|greater\s+than|higher\s+than|more\s+than|below|under|less\s+than|lower\s+than)/i);
        const reverse = text.match(/(以上|大于|超过|高于|>|以下|小于|低于|少于|<|above|over|greater\s+than|higher\s+than|more\s+than|below|under|less\s+than|lower\s+than)\s*(-?\d+(?:\.\d+)?)\s*(?:度|℃|°c|c|C)?/i);
        const isGreaterToken = (token) => /以上|大于|超过|高于|>|above|over|greater\s+than|higher\s+than|more\s+than/i.test(String(token || ''));
        if (match) {
            rule.value = Number(match[1]);
            rule.operator = isGreaterToken(match[2]) ? 'gt' : 'lt';
        } else if (reverse) {
            rule.value = Number(reverse[2]);
            rule.operator = isGreaterToken(reverse[1]) ? 'gt' : 'lt';
        } else if (explicitValue === null && explicitMin === null && explicitMax !== null) {
            // LLM 对英文 “cut data above150” 常只给 max_value=150。这里把单独 max_value 纠偏为“高于150剔除”。
            rule.value = explicitMax;
            rule.operator = 'gt';
        } else if (explicitValue === null && explicitMax === null && explicitMin !== null) {
            // 单独 min_value 通常对应“低于某值剔除”。
            rule.value = explicitMin;
            rule.operator = 'lt';
        }

        const inferred = window.inferChannelsFromText(text);
        if (inferred.length) rule.channels = inferred;

        // 只有用户明确说了“30度以上/以下”这类阈值时，才按单阈值剔除。
        // 像“修复坏点”“剔除坏点并修复”必须回落到监控 Agent 当前正常值区间，默认 [-70, 200]，避免 null 被 Number(null) 转成 0 的致命误删。
        const hasExplicitThreshold = rule.value !== null;
        if (hasExplicitThreshold && !rule.operator) {
            rule.operator = /以下|小于|低于|少于|</.test(text) ? 'lt' : 'gt';
        }
        if (!hasExplicitThreshold) {
            rule.operator = 'range';
            rule.useRangeDefault = true;
            rule.min = window.monitorAgent ? window.monitorAgent.tempRange.min : -70;
            rule.max = window.monitorAgent ? window.monitorAgent.tempRange.max : 200;
        }
        return rule;
    };

    window.eraseBadPointData = function(rule = {}) {
        const targetNames = window.resolveChannelNames(rule.channels);
        const targetSet = new Set(targetNames);
        const numericValue = window.safeNumberOrNull ? window.safeNumberOrNull(rule.value) : (Number.isFinite(Number(rule.value)) ? Number(rule.value) : null);
        const hasThreshold = numericValue !== null && (rule.operator === 'gt' || rule.operator === 'lt');
        const threshold = numericValue;
        const operator = hasThreshold ? rule.operator : 'range';
        const parsedMin = window.safeNumberOrNull ? window.safeNumberOrNull(rule.min) : (Number.isFinite(Number(rule.min)) ? Number(rule.min) : null);
        const parsedMax = window.safeNumberOrNull ? window.safeNumberOrNull(rule.max) : (Number.isFinite(Number(rule.max)) ? Number(rule.max) : null);
        const min = parsedMin !== null ? parsedMin : (window.monitorAgent ? window.monitorAgent.tempRange.min : -70);
        const max = parsedMax !== null ? parsedMax : (window.monitorAgent ? window.monitorAgent.tempRange.max : 200);
        const shouldErase = (v) => {
            if (v === null || v === undefined || Number.isNaN(Number(v))) return false;
            const num = Number(v);
            if (hasThreshold && operator === 'gt') return num > threshold;
            if (hasThreshold && operator === 'lt') return num < threshold;
            return num < min || num > max;
        };
        let erasedChart = 0;
        let erasedRaw = 0;
        window.dynamicChannels.forEach((ch, idx) => {
            if (!targetSet.has(ch.name)) return;
            const dataArray = window.chartInstance?.data?.datasets?.[idx]?.data;
            if (dataArray) {
                for (let i = 0; i < dataArray.length; i++) {
                    if (shouldErase(dataArray[i])) { dataArray[i] = null; erasedChart++; }
                }
            }
            // 只清理已经滚动到监控图里的已加载数据点，不回写 rawData。
            // 这样“剔除40度以上”只作用于当前图表缓存，不改变后续数据流，也不修改有效范围。
        });
        if (window.monitorAgent) {
            // 只有“修复坏点/按正常范围剔除”才视为故障闭环修复，清空模拟故障源。
            // 明确阈值命令（如“剔除40度以上”）只清理当前已加载点，不影响后续数据继续预警。
            if (!hasThreshold) window.monitorAgent.activeFaults = {};
            window.monitorAgent.hasTriggeredAlarm = false;
        }
        const btn = document.getElementById('btnFixFault');
        if (btn) btn.style.display = 'none';
        window.scheduleChartUpdate?.();
        const ruleText = hasThreshold ? `${operator === 'lt' ? '低于' : '高于'} ${threshold}℃` : `超出 [${min}℃, ${max}℃]`;
        window.logAgent('表格清洗与云端同步Agent', `已按规则【${targetNames.join('、') || '全部通道'}｜${ruleText}】剔除当前已加载图表 ${erasedChart} 个点；未改写原始数据流。`, 'success', 'DATA_ERASE_CORE');
        if (erasedChart > 0 && window.supervisorAgent) {
            window.logAgent('实验监控与预警Agent', `坏点剔除完成，预警闭环解除；本次清理 ${erasedChart} 个异常点。`, 'success', 'MONITOR_AGENT_CORE');
            window.supervisorAgent.resetAgentFailures?.('实验监控与预警Agent');
            window.supervisorAgent.updateHealth('实验监控与预警Agent', '在线', `坏点剔除完成，预警闭环解除；清理 ${erasedChart} 个异常点`);
        }
        return { erasedChart, erasedRaw, channels: targetNames, ruleText };
    };

    window.runFixEraseWorkflow = function(intent = {}, userCmd = '') {
        const rule = window.parseEraseRuleFromCommand(userCmd, intent);
        window.logAgent('监理Agent', '⚡ 评估完毕，发出跨进程调度指令 ➔ [表格清洗与云端同步Agent]', 'normal', 'FIX_ERASE_WORKFLOW');
        setTimeout(() => {
            window.logAgent('表格清洗与云端同步Agent', '🤝 握手成功，接管时间轴，执行坏点数据剔除...', 'normal', 'FIX_ERASE_WORKFLOW');
            window.eraseBadPointData(rule);
            if (window.monitorAgent && typeof window.monitorAgent.checkAndClearAlarm === 'function') window.monitorAgent.checkAndClearAlarm();
        }, 120);
        setTimeout(() => { window.logAgent('表格清洗与云端同步Agent', '🏁 坏点数据剔除完成，回调状态 ➔ [监理Agent]', 'normal', 'FIX_ERASE_WORKFLOW'); }, 360);
    };

    window.parseSpeedFromCommand = function(userCmd, intent = {}) {
        const text = String(userCmd || '');
        let speed = window.safeNumberOrNull(intent.speed) ?? window.safeNumberOrNull(intent.value);
        const match = text.match(/(\d+(?:\.\d+)?)\s*(?:x|X|倍速|倍)/);
        if (match) speed = Number(match[1]);
        if (/(最快|最大|拉满|极速|最高速)/.test(text)) speed = 25;
        if (/(正常速度|正常倍速|1倍|1x|一倍)/i.test(text)) speed = 1;
        if (speed === null) speed = 5;
        return Math.max(0.1, speed);
    };

    window.setMonitorSpeed = function(multiplier) {
        const speed = Number(multiplier);
        const select = document.getElementById('speedSelect');
        if (!select || !Number.isFinite(speed)) return;
        const options = Array.from(select.options).map(opt => ({
            value: Number(opt.value),
            text: opt.text,
            multiplier: Number((opt.text || '').replace(/[^0-9.]/g, '')) || null
        }));
        let best = options[0];
        let bestDist = Infinity;
        options.forEach(opt => {
            const m = opt.multiplier || (opt.value ? 500 / opt.value : 1);
            const dist = Math.abs(m - speed);
            if (dist < bestDist) { bestDist = dist; best = opt; }
        });
        select.value = String(best.value);
        if (window.monitorAgent) window.monitorAgent.syncSpeed();
        window.logAgent('实验监控与预警Agent', `滚动倍速已切换为 ${best.text || (speed + 'x')}。`, 'success', 'SET_SPEED');
    };

    window.loadAllDataNow = function() {
        if (window.monitorAgent && typeof window.monitorAgent.loadAllRemaining === 'function') {
            window.monitorAgent.loadAllRemaining();

            window.logAgent('监理Agent', '当前监控 Agent 不支持一次性加载全部数据。', 'error', 'LOAD_ALL_DATA');

    function handleAction(act, codeRef) {
        if (act !== '我已知晓') window.captureUndoSnapshot(act);
        if (act !== '我已知晓') window.logAgent('超级个体', `发出系统指令：[${act}]`, 'normal', codeRef);
        
        if (act === '剔除坏点并修复') {
            window.runFixEraseWorkflow({ channels: ['ALL'] }, '剔除坏点并修复');
        } else {
            if(act === '开始监控') window.monitorAgent.start();
            if(act === '暂停/继续试验') window.monitorAgent.togglePause();
            if(act === '触发坏点') { if(window.dynamicChannels.length > 0) window.monitorAgent.triggerFault(window.dynamicChannels[0].id, 3000); }
            if(act === '我已知晓') window.monitorAgent.acknowledge();
            if(act === '试验完成') window.monitorAgent.complete();
        }
    }

    window.normalizeIntentByCommand = function(userCmd, intent) {
        const text = String(userCmd || '').toLowerCase();
        const raw = String(userCmd || '');
        const hasBadPoint = /(坏点|异常|跳变|超限|脏点|fault|bad)/i.test(text);
        const wantsErase = /(剔除|清除|删除|擦除|清理|修复|处理|移除|erase|clean|fix|remove)/i.test(text);
        const wantsHide = /(隐藏|关闭|不显示|屏蔽通道|hide|close)/i.test(text);
        const wantsShow = /(显示|打开|开启|恢复显示|show|open)/i.test(text);
        const wantsAllChannels = /(所有通道|全部通道|所有曲线|全部曲线|所有|全部|all)/i.test(raw);
        const wantsReport = /(数据分析|智能诊断|诊断|分析|报告|ppt|pptx|report)/i.test(text);
        const wantsKeepOnly = /(只保留|仅保留|只显示|只看|只打开|仅打开|只开启|仅开启|独占显示|单独显示|打开只有|显示只有)/i.test(raw);
        const wantsSpeed = /(倍速|滚动速度|播放速度|速度|加速|减速|快一点|慢一点|speed|\d+\s*x)/i.test(raw);
        const wantsLoadAll = /(一下加载完|一次性加载|加载全部|全部加载|直接显示全部|显示全部数据|跑完全部|快进到结束|全部数据)/i.test(raw);
        const mentionsChineseChannels = /(中文|汉字|汉语|中文字)/i.test(raw);
        const wantsNonChineseChannels = /(不带中文|不含中文|没有中文|非中文|不带汉字|不含汉字|没有汉字|不带有中文|不带有汉字)/i.test(raw);
        const wantsOnlyChineseChannels = mentionsChineseChannels && (
            wantsKeepOnly ||
            /(只打开|仅打开|只开启|仅开启|只显示|仅显示|只保留|仅保留|打开只有|显示只有|打开.*带有|打开.*含有|显示.*带有|显示.*含有)/i.test(raw) ||
            (wantsShow && /(只有|只|仅|带有|含有)/i.test(raw)) ||
            (wantsHide && wantsNonChineseChannels)
        );
        const chineseChannels = mentionsChineseChannels && window.getChineseChannelNames ? window.getChineseChannelNames() : [];
        const nonChineseChannels = mentionsChineseChannels && window.getNonChineseChannelNames ? window.getNonChineseChannelNames() : [];
        const inferredChannels = window.inferChannelsFromText ? window.inferChannelsFromText(raw) : [];

        if (mentionsChineseChannels && wantsOnlyChineseChannels && chineseChannels.length) {
            return { ...intent, action: 'isolate_channel', channels: chineseChannels };
        }
        if (mentionsChineseChannels && wantsHide && !wantsNonChineseChannels && chineseChannels.length) {
            return { ...intent, action: 'hide_channel', channels: chineseChannels };
        }
        if (mentionsChineseChannels && wantsShow && !wantsOnlyChineseChannels && chineseChannels.length) {
            return { ...intent, action: 'show_channel', channels: chineseChannels };
        }
        if (mentionsChineseChannels && wantsHide && wantsNonChineseChannels && nonChineseChannels.length) {
            return { ...intent, action: 'hide_channel', channels: nonChineseChannels };
        }

        if (wantsLoadAll) {
            return { ...intent, action: 'load_all_data' };
        }
        if (wantsSpeed) {
            return { ...intent, action: 'set_speed', speed: window.parseSpeedFromCommand ? window.parseSpeedFromCommand(raw, intent) : intent.speed };
        }
        if (wantsKeepOnly && inferredChannels.length) {
            return { ...intent, action: 'isolate_channel', channels: inferredChannels };
        }
        // “关闭所有通道/隐藏全部通道”属于显示控制，不是“隐藏坏点通道”。
        if (wantsHide && !hasBadPoint && (wantsAllChannels || inferredChannels.length)) {
            return { ...intent, action: 'hide_channel', channels: wantsAllChannels ? ['ALL'] : inferredChannels };
        }
        if (wantsShow && !hasBadPoint && (wantsAllChannels || inferredChannels.length)) {
            return { ...intent, action: 'show_channel', channels: wantsAllChannels ? ['ALL'] : inferredChannels };
        }
        // “注水里，剔除30度以上的数据点”这类命令不一定出现“坏点”，也要进入按条件剔除。
        if (wantsErase && !wantsHide) {
            const rule = window.parseEraseRuleFromCommand ? window.parseEraseRuleFromCommand(raw, intent) : {};
            return { ...intent, action: 'fix_erase', channels: rule.channels && rule.channels.length ? rule.channels : intent.channels, value: rule.value, operator: rule.operator, min_value: rule.min, max_value: rule.max };
        }
        if (hasBadPoint && wantsHide) {
            return { ...intent, action: 'hide_bad_channels' };
        }
        if (wantsReport) {
            return { ...intent, action: 'report' };
        }
        return intent;
    };

    async function executeNlCommand() {
        const apiKey = document.getElementById('deepseekApiKey').value.trim();
        const userCmd = document.getElementById('nlCommand').value.trim();
        if (!userCmd) return;
        if (!window.rawData?.length) { alert('请先点击「加载示例数据」或上传 CSV 数据。'); return; }
        window.captureUndoSnapshot(userCmd);
        if (!apiKey && window.tryExecuteLocalDemoCommand(userCmd)) {
            document.getElementById('nlCommand').value = '';
            return;
        }
        if (!apiKey) { alert("请先在右上角输入或缓存 DeepSeek API Key；示例 Prompt 可在加载 Demo 后无 Key 运行。"); return; }

        const btn = document.getElementById('btnNlSubmit'); btn.innerText = "⏳ 解析..."; btn.disabled = true;
        window.logAgent('超级个体', `NL2Action 指令：[${userCmd}]`, 'normal', 'USER_NL_INPUT');

        const dynNames = window.dynamicChannels.map(c => c.name);
        const tools = [{
            type: "function",
            function: {
                name: "execute_system_command",
                description: "控制制冷监控系统的显示、阈值、坏点数据剔除、实验状态和报告操作",
                parameters: {
                    type: "object",
                    properties: {
                        action: { type: "string", enum: [ "isolate_channel", "hide_channel", "show_channel", "hide_bad_channels", "hide_above_threshold", "adjust_range", "trigger_fault", "complete_experiment", "report", "pause_system", "start_system", "ignore", "fix_erase", "set_speed", "load_all_data", "unknown" ], description: "动作类型。fix_erase=剔除/清除/删除/擦除坏点数据；hide_bad_channels=隐藏/关闭坏点通道；report=数据分析/诊断/生成报告；set_speed=改变滚动倍速；load_all_data=一次性加载全部数据。" },
                        channels: { type: "array", items: { type: "string" }, description: `目标通道名称。可选值: ${dynNames.join(', ')}, 功率, 或 ["ALL"]` },
                        value: { type: "number" }, min_value: { type: "number" }, max_value: { type: "number" },
                        speed: { type: "number", description: "滚动倍速，例如 1、5、25。" }
                    }, required: ["action"]
                }
            }
        }];

        try {
            const requestIntent = () => fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [
                    {"role": "system", "content": "你是工业测试数据软件的意图解析器。必须严格区分：用户说剔除/清除/删除/擦除/修复坏点数据时，action 必须是 fix_erase；用户说隐藏/关闭/不显示坏点通道时，action 才是 hide_bad_channels；但用户说关闭所有通道/隐藏全部通道/不显示所有通道时，action 必须是 hide_channel 且 channels=[\"ALL\"]；用户说打开所有通道/显示全部通道时，action 必须是 show_channel 且 channels=[\"ALL\"]；用户说数据分析/诊断/生成报告/PPT 时，action 是 report；用户说改变滚动速度/倍速时，action 是 set_speed；用户说一次性加载全部/直接显示全部数据时，action 是 load_all_data。英文 cut/remove/delete/erase data above 150 表示 fix_erase 且 operator=gt、value=150；below/under 150 表示 operator=lt、value=150。"},
                    {"role": "user", "content": userCmd}
                ], tools: tools, tool_choice: { "type": "function", "function": { "name": "execute_system_command" } }, temperature: 0.1 })
            });
            const response = window.supervisorAgent?.runWithRetry
                ? await window.supervisorAgent.runWithRetry({
                    title: `NL2Action路由：${userCmd.slice(0, 24)}`,
                    agent: '监理Agent',
                    type: 'llm_routing',
                    maxRetries: 2,
                    operation: async () => {
                        const res = await requestIntent();
                        if (!res.ok && res.status !== 401 && res.status !== 403) throw new Error(`LLM路由HTTP ${res.status}`);
                        return res;
                    }
                })
                : await requestIntent();

            const data = await response.json();
            window.logTokenUsage('监理Agent', 'NL2Action DeepSeek 通讯完成', data.usage, 'LLM_TOKEN_USAGE');
            const toolCall = data.choices[0].message.tool_calls[0];
            let intent = JSON.parse(toolCall.function.arguments);
            intent = window.normalizeIntentByCommand(userCmd, intent);
            window.logAgent('监理Agent', `🔧 FC 调度：<br><span style="color:#bc8cff;">${JSON.stringify(intent)}</span>`, 'normal', 'LLM_REASONING');

            let targets = intent.channels ? (Array.isArray(intent.channels) ? intent.channels : [intent.channels]) : [];
            let explicitAll = targets.includes("ALL");
            if ((!targets || targets.length === 0 || explicitAll) && ['isolate_channel','hide_channel','show_channel'].includes(intent.action)) {
                const inferred = window.inferChannelsFromText(userCmd);
                if (inferred.length) { targets = inferred; explicitAll = false; }
            }
            if (window.resolveChannelNames) {
                const resolvedTargets = window.resolveChannelNames(targets);
                if (resolvedTargets.length) targets = resolvedTargets;
            }
            const isAll = explicitAll || targets.includes("ALL");

            if (intent.action === "adjust_range") {
                const min = parseFloat(intent.min_value); const max = parseFloat(intent.max_value);
                if (!isNaN(min) && !isNaN(max)) { if (window.monitorAgent) window.monitorAgent.setRange(min, max); }
            }
            else if (intent.action === "hide_bad_channels") {
                window.applyHideBadChannels();
            }
            else if (intent.action === "hide_above_threshold") {
                const threshold = parseFloat(intent.value);
                let hiddenChannels = [];
                window.dynamicChannels.forEach((ch, idx) => {
                    const dataArr = window.chartInstance?.data?.datasets?.[idx]?.data;
                    if (!dataArr) return;
                    if (dataArr.some(val => val !== null && val !== undefined && val > threshold)) {
                        window.chartInstance.data.datasets[idx].hidden = true;
                        const checkboxes = document.querySelectorAll('.channel-toggle input'); if(checkboxes[idx]) checkboxes[idx].checked = false;
                        hiddenChannels.push(ch.name);
                    }
                });
                if(window.chartInstance) window.chartInstance.update('none');
                window.logAgent('超级个体', `系统指令：[隐藏温度大于 ${threshold}℃ 的通道 - ${hiddenChannels.length ? hiddenChannels.join(',') : '无'}]`, 'normal', 'HIDE_ABOVE_THRESHOLD');
            }
            else if (intent.action === "isolate_channel") {
                window.dynamicChannels.forEach((ch, idx) => {
                    const isTarget = isAll || targets.some(t => ch.name === t || ch.id === t);
                    if(window.chartInstance) window.chartInstance.data.datasets[idx].hidden = !isTarget;
                    const checkboxes = document.querySelectorAll('.channel-toggle input'); if(checkboxes[idx]) checkboxes[idx].checked = isTarget;
                });
                if (window.hasPower && window.powerChartInstance) {
                    const isTarget = isAll || targets.some(t => t.includes('功率'));
                    window.powerChartInstance.data.datasets[0].hidden = !isTarget;
                    const powerCheckbox = document.querySelectorAll('.channel-toggle input')[window.dynamicChannels.length]; if (powerCheckbox) powerCheckbox.checked = isTarget;
                }
                if(window.chartInstance) window.chartInstance.update('none'); if(window.hasPower) window.powerChartInstance.update('none');
                window.logAgent('超级个体', `系统指令：[独占显示通道 - ${isAll ? '所有' : targets.join(',')}]`, 'normal', 'ISOLATE_CHANNEL');
            }
            else if (intent.action === "hide_channel" || intent.action === "show_channel") {
                const forceHide = (intent.action === "hide_channel");
                window.dynamicChannels.forEach((ch, idx) => {
                    const isTarget = isAll || targets.some(t => ch.name === t || ch.id === t);
                    if (isTarget && window.chartInstance) {
                        window.chartInstance.data.datasets[idx].hidden = forceHide;
                        const checkboxes = document.querySelectorAll('.channel-toggle input'); if(checkboxes[idx]) checkboxes[idx].checked = !forceHide;
                    }
                });
                if (window.hasPower && window.powerChartInstance && (isAll || targets.some(t => t.includes('功率')))) {
                    window.powerChartInstance.data.datasets[0].hidden = forceHide;
                    const powerCheckbox = document.querySelectorAll('.channel-toggle input')[window.dynamicChannels.length]; if (powerCheckbox) powerCheckbox.checked = !forceHide;
                }
                if(window.chartInstance) window.chartInstance.update('none'); if(window.hasPower) window.powerChartInstance.update('none');
                window.logAgent('超级个体', `系统指令：[${forceHide?'隐藏':'显示'}通道 - ${isAll ? '所有' : targets.join(',')}]`, 'normal', forceHide ? 'HIDE_CHANNEL' : 'SHOW_CHANNEL');
            }
            else if (intent.action === "trigger_fault") {
                if (targets.length === 0 && window.dynamicChannels.length > 0) targets.push(window.dynamicChannels[0].id);
                targets.forEach(tc => { if(window.monitorAgent) window.monitorAgent.triggerFault(tc, intent.value); });
            }
            else if (intent.action === "complete_experiment") { if(window.monitorAgent) window.monitorAgent.complete(); }
            
            // 🚀 拦截 Report 生成极具视觉冲击力的跨 Agent 日志
            else if (intent.action === "report") { 
                window.logAgent('监理Agent', '⚡ 实验完成，触发分析诊断指令 ➔ [表格清洗与云端同步Agent]', 'normal');
                setTimeout(() => {
                    window.logAgent('表格清洗与云端同步Agent', '🤝 握手成功，接管图表控制权，请在图表上框选【感兴趣数据段】...', 'normal');
                    if(window.cleanerAgent) window.cleanerAgent.activate('REPORT');
                }, 600);
            }
            
            else if (intent.action === "fix_erase") { 
                window.runFixEraseWorkflow(intent, userCmd);
            }
            
            else if (intent.action === "pause_system") { if(window.monitorAgent) window.monitorAgent.togglePause(); }
            else if (intent.action === "start_system") { if(window.monitorAgent) window.monitorAgent.start(); }
            else if (intent.action === "set_speed") { window.setMonitorSpeed(window.parseSpeedFromCommand(userCmd, intent)); }
            else if (intent.action === "load_all_data") { window.loadAllDataNow(); }
            else if (intent.action === "ignore") { if(window.monitorAgent) window.monitorAgent.acknowledge(); }
            else { window.logAgent('监理Agent', `未匹配到有效系统动作。`, 'normal'); }

            if (window.monitorAgent && typeof window.monitorAgent.checkAndClearAlarm === 'function') window.monitorAgent.checkAndClearAlarm();

        } catch (error) {
            window.logAgent('监理Agent', `解析异常: ${error.message}`, 'error');
        } finally {
            btn.innerText = "🧠 AI 执行"; btn.disabled = false; document.getElementById('nlCommand').value = '';
        }
    }

    window.zoomX = function(mode, evt = null) { 
        const len = window.getChartLength();
        if(!window.chartInstance || len === 0) return;
        window.stopAutoScroll();
        window.globalViewMode = 'window';

        let start = window.viewStartIndex ?? Math.max(0, len - (window.currentWindowSize || 60));
        let end = window.viewEndIndex ?? (len - 1);
        start = Math.max(0, Math.min(start, len - 1));
        end = Math.max(start, Math.min(end, len - 1));
        const oldSize = Math.max(1, end - start + 1);
        let ratio = 0.5;
        if (evt) {
            const rect = document.getElementById('chartArea').getBoundingClientRect();
            ratio = Math.max(0, Math.min(1, (evt.clientX - rect.left) / Math.max(1, rect.width)));
        } else if (mode === 'in' || mode === 'out') {
            ratio = 1; // 按钮默认围绕最新端缩放，更符合实时曲线习惯。
        }
        const anchor = start + Math.round((oldSize - 1) * ratio);
        const newSize = mode === 'in'
            ? Math.max(10, Math.floor(oldSize * 0.75))
            : Math.min(len, Math.ceil(oldSize * 1.35));
        let newStart = anchor - Math.round((newSize - 1) * ratio);
        let newEnd = newStart + newSize - 1;
        if (newStart < 0) { newStart = 0; newEnd = Math.min(len - 1, newSize - 1); }
        if (newEnd >= len) { newEnd = len - 1; newStart = Math.max(0, newEnd - newSize + 1); }
        window.applyChartWindow(newStart, newEnd, true);
    };

`,
        AUTO_COMPLETE: `// 滚动到 CSV 最后一行后自动停止
if (currentIndex >= rawData.length) {
  monitorAgent.complete(true);
}
// load_all_data 只负责一次性显示，不触发自动停止日志。`
    };

    window.inferCodeRef = function(agent, message) {
        const m = String(message || '');
        if (m.includes('倍速')) return 'SET_SPEED';
        if (m.includes('最后一行') || m.includes('自动停止')) return 'AUTO_COMPLETE';
        if (m.includes('一次性加载')) return 'LOAD_ALL_DATA';
        if (m.includes('FC 调度')) return 'LLM_REASONING';
        if (m.includes('剔除') || m.includes('接管时间轴')) return 'FIX_ERASE_WORKFLOW';
        if (m.includes('独占显示')) return 'ISOLATE_CHANNEL';
        if (m.includes('隐藏当前异常通道')) return 'HIDE_BAD_CHANNELS';
        if (agent.includes('数据提取')) return 'DATA_EXTRACTOR_PARSE';
        if (agent.includes('实验监控')) return 'MONITOR_AGENT_CORE';
        if (agent.includes('表格清洗')) return 'CLEANER_AGENT_CORE';
        if (agent.includes('分析与报告')) return 'REPORT_GEN';
        if (agent.includes('监理')) return 'SUPERVISOR_ROUTING';
        if (agent.includes('超级个体')) return 'USER_NL_INPUT';
        return 'SUPERVISOR_ROUTING';
    };

    window.openCodeRef = function(el) {
        const ref = el?.dataset?.codeRef || 'SUPERVISOR_ROUTING';
        const title = document.getElementById('codeInspectorTitle');
        const body = document.getElementById('codeInspectorBody');
        const modal = document.getElementById('codeInspector');
        if (title) title.innerText = `触发代码｜${ref}`;
        if (body) body.textContent = window.codeSnippetRegistry[ref] || window.codeSnippetRegistry.SUPERVISOR_ROUTING;
        if (modal) modal.classList.add('active');
    };

    window.closeCodeInspector = function() {
        const modal = document.getElementById('codeInspector');
        if (modal) modal.classList.remove('active');
    };

    window.logAgent = function(agent, message, type = 'normal', codeRef = null) {
        const consoleDiv = document.getElementById('console');
        const div = document.createElement('div'); div.className = 'log-entry';
        let agentClass = `agent-${agent}`.replace(/ /g, '');
        const ref = codeRef || window.inferCodeRef(agent, message);
        window.supervisorAgent?.recordLog(agent, message, type, ref);
        div.innerHTML = `<span style="color:#8b949e;margin-right:8px">[${new Date().toLocaleTimeString()}]</span> <span class="${agentClass} agent-name" data-code-ref="${ref}" onclick="window.openCodeRef(this)" title="点击查看本步骤触发代码">[${agent}]</span> <span class="${type==='error'?'log-error':''}">${message}</span>`;
        if(type==='success') div.innerHTML = div.innerHTML.replace('log-error', 'log-success');
        consoleDiv.appendChild(div); consoleDiv.scrollTop = consoleDiv.scrollHeight;
    };

    document.addEventListener('keydown', function(e) {
        const target = e.target;
        const isEditable = target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable);
        if ((e.ctrlKey || e.metaKey) && e.key && e.key.toLowerCase() === 'z' && !isEditable) {
            e.preventDefault();
            window.restoreUndoSnapshot();
            return;
        }
        if (e.key === 'Escape' && window.cleanerAgent && window.cleanerAgent.isActive) { window.cleanerAgent.cancelSelection(); }
    });

    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
